services:
  db:
    image: postgres:16-alpine
    container_name: itsalplatform-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: itsal
      POSTGRES_PASSWORD: itsal_dev
      POSTGRES_DB: itsalplatform
    ports:
      - "5433:5432"
    volumes:
      - itsal_pg_data:/var/lib/postgresql/data

volumes:
  itsal_pg_data:
